<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Somma Massima di Due Numeri</title>
</head>
<body>

    <h2>Trova la Somma Massima (2 su 4)</h2>
    <p>Inserisci quattro numeri interi:</p>
    
    <div class="input">
        <input type="number" id="num1" >
        <input type="number" id="num2" >
        <input type="number" id="num3" >
        <input type="number" id="num4" >
    </div>
    
    <button onclick="calcolaSommaMassima()">Calcola Somma</button>
    
    <div id="risultato"></div>

    <script>
        function calcolaSommaMassima() {

            let n1 = parseInt(document.getElementById('num1').value);
            let n2 = parseInt(document.getElementById('num2').value);
            let n3 = parseInt(document.getElementById('num3').value);
            let n4 = parseInt(document.getElementById('num4').value);

            let numeri = [n1, n2, n3, n4];

            numeri.sort(function(a, b) {
                return b - a;
            });

            let max1 = numeri[0];
            let max2 = numeri[1];
            let somma = max1 + max2;

            document.getElementById('risultato').innerHTML = 
                "I due numeri più grandi sono: " + max1 + " e " + max2 + 
                "<br>La somma massima è: " + somma;
        }
    </script>
</body>
</html>
