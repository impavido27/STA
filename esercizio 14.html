<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h2>Dati quattro numeri interi dire se sono in ordine crescente o no</h2>
    <p>Inserisci quattro numeri interi:</p>


    <div class="input">
     <input type="number" id="num1" >
     <input type="number" id="num2" >
     <input type="number" id="num3" >
     <input type="number" id="num4" >
    </div>

     <button onclick="ControlloScala()">Controllo ordine numeri</button>

     <div id="risultato"></div>
    
      <script>
        function ControlloScala() {

            let n1 = parseInt(document.getElementById('num1').value);
            let n2 = parseInt(document.getElementById('num2').value);
            let n3 = parseInt(document.getElementById('num3').value);
            let n4 = parseInt(document.getElementById('num4').value);


       
          if (n1<n2, n2<n3, n3<n4)
            {
             document.getElementById("risultato").innerHTML = "i numeri sono in ordine crescente";
            }
         else
           {
             document.getElementById("risultato").innerHTML = "i numeri NON sono in ordine crescente" ;
           }
        }
        
        </script>

</body>
</html>
